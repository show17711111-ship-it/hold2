<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="theme-color" content="#000">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Hold'em">
<link rel="manifest" href="manifest.json">
<title>Hold'em Strategy</title>
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html,body{height:100%;background:#000;color:#ddd;font-family:-apple-system,BlinkMacSystemFont,'Pretendard',sans-serif;overflow:hidden;}
button{font-family:inherit;border:none;cursor:pointer;background:none;}
input{-webkit-appearance:none;appearance:none;font-family:inherit;border:none;outline:none;}
input[type=number]{-moz-appearance:textfield;}
input::-webkit-inner-spin-button,input::-webkit-outer-spin-button{-webkit-appearance:none;}
#app{display:flex;flex-direction:column;height:100vh;height:100dvh;}
#hdr{background:#080808;border-bottom:0.5px solid #1a1a1a;flex-shrink:0;padding-top:env(safe-area-inset-top,0);}
#content{flex:1;overflow-y:auto;overflow-x:hidden;-webkit-overflow-scrolling:touch;padding-bottom:56px;}
/* ── 핸드 팝업: 화면 중앙 ── */
#sheet-overlay{display:none;position:fixed;inset:0;z-index:6000;background:rgba(0,0,0,.75);align-items:center;justify-content:center;padding:16px;}
#sheet-overlay.open{display:flex;animation:fadeIn .2s ease;}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
#sheet{background:#0d0d0d;border:1.5px solid #14532d;border-radius:16px;padding:16px 15px;max-width:440px;width:100%;box-shadow:0 8px 40px rgba(0,0,0,.95);max-height:82dvh;overflow-y:auto;}

/* ── 차트 하단 고정 정보 패널 ── */
#hand-info-panel{background:#080808;border-top:1.5px solid #166534;}

/* ══ 헤더 전체 ══ */

/* 요약바 (항상 보임) */
#summary-bar{display:flex;align-items:center;justify-content:space-between;padding:7px 11px;cursor:pointer;gap:6px;border-bottom:0.5px solid #1a1a1a;}
#sum-left{display:flex;align-items:center;gap:6px;flex:1;min-width:0;}
#sum-mode{font-size:10px;font-weight:700;padding:2px 7px;border-radius:4px;background:#14532d;color:#86efac;flex-shrink:0;}
#sum-pos{font-size:13px;font-weight:700;font-family:monospace;color:#f0c040;flex-shrink:0;}
#sum-blind{font-size:10px;color:#ddd;flex-shrink:0;}
#sum-timer{font-size:12px;font-weight:700;font-family:monospace;color:#f0c040;flex-shrink:0;}
#sum-zone{font-size:9px;padding:2px 6px;border-radius:4px;background:#111;color:#aaa;flex-shrink:0;white-space:nowrap;}
#sum-right{display:flex;align-items:center;gap:5px;flex-shrink:0;}
.ibt{width:28px;height:28px;border-radius:5px;background:#1a1a1a;border:0.5px solid #2a2a2a;color:#888;font-size:13px;display:flex;align-items:center;justify-content:center;}
#tog-arrow{font-size:12px;color:#4ade80;flex-shrink:0;}

/* 접히는 설정 패널 */
#settings-panel{overflow:hidden;transition:max-height .28s cubic-bezier(.4,0,.2,1);max-height:260px;}
#settings-panel.collapsed{max-height:0;}

/* 설정 라인들 */
.cfg-row{display:flex;align-items:center;gap:5px;padding:4px 10px;}

/* 인원 */
.slbl{font-size:9px;color:#ddd;flex-shrink:0;font-weight:600;}
.p-btns{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;}
.p-btns::-webkit-scrollbar{display:none;}
.pb{min-width:28px;height:26px;border-radius:4px;border:0.5px solid #222;background:#141414;color:#ccc;font-size:10px;font-weight:700;flex-shrink:0;}
.pb.on{background:#14532d;color:#86efac;border-color:#166534;}

/* 블라인드+타이머 1줄 */
.bl{font-size:9px;color:#bbb;flex-shrink:0;font-weight:600;}
.bi{width:62px;height:26px;background:#141414;border:0.5px solid #222;border-radius:5px;color:#fff;font-size:12px;font-weight:700;text-align:center;font-family:monospace;}
.bi:focus{border-color:#166534;}
.ti{width:40px;height:26px;background:#141414;border:0.5px solid #222;border-radius:5px;color:#ddd;font-size:10px;text-align:center;font-family:monospace;}
.ti:focus{border-color:#166534;}
.ti-l{font-size:9px;color:#bbb;white-space:nowrap;flex-shrink:0;}
#tdsp{display:flex;align-items:center;gap:4px;background:#141414;border:0.5px solid #222;border-radius:5px;height:26px;padding:0 7px;flex:1;min-width:0;overflow:hidden;}
#t-time{font-size:13px;font-weight:700;font-family:monospace;color:#f0c040;flex-shrink:0;}
#t-lvl{font-size:8px;color:#aaa;flex-shrink:0;}
#t-blind{font-size:8px;color:#4ade80;flex:1;text-align:right;font-family:monospace;white-space:nowrap;overflow:hidden;}
/* t-play/t-rst는 줄4로 이동, 줄2에서 제거됨 */

/* 칩 입력 */
.ci{height:26px;background:#141414;border:0.5px solid #222;border-radius:5px;color:#fff;font-size:11px;font-weight:600;text-align:center;font-family:monospace;}
.ci:focus{border-color:#166534;}
.cg-bb{font-size:8px;color:#aaa;}
.cl{font-size:9px;color:#bbb;flex-shrink:0;font-weight:600;}

/* 스타트/끝내기 버튼 */
#btn-start{flex:1;height:28px;border-radius:6px;background:#14532d;border:0.5px solid #166534;color:#86efac;font-size:11px;font-weight:700;}
#btn-end{flex:1;height:28px;border-radius:6px;background:#2d0808;border:0.5px solid #7c2020;color:#fca5a5;font-size:11px;font-weight:700;}
#btn-rst{height:28px;padding:0 10px;border-radius:6px;background:#141414;border:0.5px solid #2a2a2a;color:#888;font-size:13px;font-weight:700;flex-shrink:0;}

/* 내자리 */
#seat-btns{display:flex;gap:2px;overflow-x:auto;scrollbar-width:none;flex:1;}
#seat-btns::-webkit-scrollbar{display:none;}
.sb2{min-width:24px;height:26px;border-radius:4px;border:0.5px solid #222;background:#141414;color:#ddd;font-size:10px;font-weight:700;flex-shrink:0;}
.sb2.on{background:#1c1500;color:#f0c040;border-color:#3a2800;}

/* 모드 토글 - 한 줄 스크롤 */
#mode-tog{display:flex;background:#111;border-radius:5px;border:0.5px solid #222;overflow-x:auto;scrollbar-width:none;}
#mode-tog::-webkit-scrollbar{display:none;}
.mtb{padding:4px 7px;font-size:10px;font-weight:700;color:#777;white-space:nowrap;flex-shrink:0;}
.mtb.on{background:#1e3a5f;color:#7dd3fc;}
.mtb.onp{background:#3b1c00;color:#fb923c;}
.mtb.onfree{background:#1a0a3b;color:#c084fc;}
.mtb.onmini{background:#1a1a3b;color:#a5b4fc;}
.mtb.ondaily{background:#0a2020;color:#34d399;}
.mtb.onhigh{background:#2a1500;color:#fbbf24;}
/* 빌런 버튼 */
#villain-btn{padding:2px 8px;height:26px;border-radius:5px;background:#1a0808;border:0.5px solid #7c2020;color:#f87171;font-size:10px;font-weight:700;flex-shrink:0;white-space:nowrap;}
#villain-btn.on{background:#3d0e0e;border-color:#ef4444;color:#fca5a5;animation:pulse .8s ease-in-out infinite;}
@keyframes pulse{0%,100%{box-shadow:0 0 0 0 rgba(239,68,68,.4);}50%{box-shadow:0 0 0 4px rgba(239,68,68,0);}}
#villain-badge{display:none;font-size:9px;color:#f87171;background:#1a0808;border:0.5px solid #7c2020;padding:1px 6px;border-radius:4px;flex-shrink:0;}
#villain-badge.on{display:inline-block;}

/* 숏칩 뱃지 */
#short-chip-badge{display:none;font-size:9px;font-weight:700;color:#fbbf24;background:#2d1800;border:0.5px solid #7c4a00;padding:2px 6px;border-radius:4px;flex-shrink:0;animation:shortPulse 1s ease-in-out infinite;}
#short-chip-badge.on{display:inline-block;}
@keyframes shortPulse{0%,100%{opacity:1;}50%{opacity:.6;}}

/* 브레이크 */
#brk-wrap{display:flex;gap:3px;align-items:center;flex-shrink:0;}
#brk-t-in{width:38px;height:26px;background:#141414;border:0.5px solid #222;border-radius:4px;color:#ddd;font-size:9px;text-align:center;font-family:monospace;}
#brk-btn{height:26px;padding:0 6px;border-radius:4px;background:#1c1500;border:0.5px solid #3a2800;color:#c8a000;font-size:10px;font-weight:700;white-space:nowrap;}
#brk-btn.active{background:#1a0800;border-color:#f97316;color:#f97316;}

/* ─ 블라인드+타이머 ─ */
#r3{padding:0 11px 5px;display:flex;gap:6px;align-items:stretch;}
#blind-box{display:flex;flex-direction:column;gap:3px;}
.brow{display:flex;align-items:center;gap:3px;}
.bl{font-size:10px;color:#ddd;width:14px;flex-shrink:0;font-weight:600;}
.bi{width:84px;height:30px;background:#141414;border:0.5px solid #2a2a2a;border-radius:6px;color:#fff;font-size:14px;font-weight:700;text-align:center;font-family:monospace;}
.bi:focus{border-color:#166534;}
#timer-box{flex:1;display:flex;flex-direction:column;gap:3px;}
.ti-row{display:flex;align-items:center;gap:3px;}
.ti-l{font-size:10px;color:#ddd;white-space:nowrap;font-weight:600;}
.ti{width:44px;height:29px;background:#141414;border:0.5px solid #2a2a2a;border-radius:5px;color:#ddd;font-size:11px;text-align:center;font-family:monospace;}
.ti:focus{border-color:#166534;}
#tc{display:flex;align-items:center;gap:3px;}
#tdsp{flex:1;background:#0f0f0f;border-radius:5px;height:27px;display:flex;align-items:center;gap:4px;padding:0 6px;border:0.5px solid #1a1a1a;min-width:0;overflow:hidden;}
#t-time{font-size:13px;font-weight:700;font-family:monospace;color:#f0c040;flex-shrink:0;}
#t-lvl{font-size:9px;color:#ccc;}
#t-blind{font-size:8px;color:#4ade80;flex:1;text-align:right;font-family:monospace;white-space:nowrap;overflow:hidden;}
#t-play{width:27px;height:27px;border-radius:5px;background:#14532d;border:0.5px solid #166534;color:#86efac;font-size:12px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#t-play.pause{background:#3d1400;border-color:#7c2d12;color:#fdba74;}
#t-rst{width:23px;height:27px;border-radius:5px;background:#0f0f0f;border:0.5px solid #1a1a1a;color:#888;font-size:12px;display:flex;align-items:center;justify-content:center;}

/* ─ 칩 + 팟참여 + 브레이크 ─ */
#r3b{padding:0 11px 5px;display:flex;gap:5px;align-items:center;}
.cg{display:flex;flex-direction:column;gap:1px;flex:1;}
.cg-top{display:flex;align-items:center;gap:3px;}
.cl{font-size:9px;color:#ddd;white-space:nowrap;flex-shrink:0;font-weight:600;}
.ci{flex:1;height:28px;background:#141414;border:0.5px solid #2a2a2a;border-radius:5px;color:#fff;font-size:12px;font-weight:600;text-align:center;font-family:monospace;min-width:0;}
.ci:focus{border-color:#166534;}
.cg-bb{font-size:9px;color:#aaa;text-align:center;height:11px;}
.pot-g{display:flex;flex-direction:column;gap:1px;flex-shrink:0;}
.pot-label{font-size:9px;color:#ddd;text-align:center;font-weight:600;}
.pot-btns{display:flex;gap:1px;}
.potb{width:23px;height:28px;border-radius:4px;border:0.5px solid #2a2a2a;background:#141414;color:#999;font-size:10px;font-weight:700;}
.potb.on{background:#14532d;color:#86efac;border-color:#166534;}
#brk-wrap{display:flex;flex-direction:column;gap:2px;flex-shrink:0;}
#brk-t-in{width:38px;height:25px;background:#0f0f0f;border:0.5px solid #1a1a1a;border-radius:4px;color:#ddd;font-size:9px;text-align:center;font-family:monospace;}
#brk-btn{height:25px;padding:0 6px;border-radius:4px;background:#161200;border:0.5px solid #2a2000;color:#c8a000;font-size:10px;font-weight:700;white-space:nowrap;}
#brk-btn.active{background:#1a0800;border-color:#f97316;color:#f97316;}

#tbar-w{height:2px;background:#080808;}
#tbar{height:2px;background:#4ade80;transition:width .8s linear;width:100%;}
#r4{padding:5px 11px 6px;display:flex;align-items:center;gap:5px;border-top:0.5px solid #141414;background:#060606;}
#seat-btns{display:flex;gap:2px;flex:1;overflow-x:auto;scrollbar-width:none;}
#seat-btns::-webkit-scrollbar{display:none;}
.sb2{min-width:26px;height:26px;border-radius:4px;border:0.5px solid #2a2a2a;background:#141414;color:#999;font-size:11px;font-weight:700;flex-shrink:0;}
.sb2.on{background:#16110a;color:#f0c040;border-color:#2a1f00;}
#next-btn{display:flex;align-items:center;gap:3px;padding:0 11px;height:34px;background:#14532d;border-radius:7px;border:0.5px solid #166534;color:#86efac;font-size:12px;font-weight:700;white-space:nowrap;flex-shrink:0;}
#next-lbl{font-size:9px;color:#4ade80;font-family:monospace;}

/* ─ 게임 컨트롤 행 ─ */
#game-row-a{display:flex;align-items:center;gap:4px;padding:5px 9px;border-bottom:0.5px solid #1a1a1a;background:#060606;flex-wrap:nowrap;overflow-x:auto;scrollbar-width:none;}
#game-row-a::-webkit-scrollbar{display:none;}

/* ─ 시나리오 바 ─ */
#sc-bar{display:flex;gap:3px;padding:6px 11px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #141414;background:#040404;}
#sc-bar::-webkit-scrollbar{display:none;}
.scpill{display:flex;flex-direction:column;align-items:center;padding:4px 7px;border-radius:5px;border:0.5px solid #2a2a2a;background:#141414;cursor:pointer;flex-shrink:0;min-width:46px;}
.scpill .sp1{font-size:9px;font-weight:700;color:#aaa;}
.scpill .sp2{font-size:7px;color:#bbb;margin-top:1px;}
.scpill.on{background:#14532d;border-color:#166534;}
.scpill.on .sp1{color:#86efac;}
.scpill.on .sp2{color:#4ade80;}

/* ─ 포지션 바 ─ */
#pos-bar{display:flex;gap:4px;padding:6px 11px;overflow-x:auto;scrollbar-width:none;border-bottom:0.5px solid #141414;}
#pos-bar::-webkit-scrollbar{display:none;}
.pp{display:flex;flex-direction:column;align-items:center;justify-content:center;min-width:48px;height:44px;border-radius:7px;border:0.5px solid #2a2a2a;background:#141414;flex-shrink:0;position:relative;}
.pp .pn{font-size:11px;font-weight:700;font-family:monospace;color:#e0e0e0;}
.pp .pr{font-size:7px;color:#aaa;margin-top:2px;}
.pp.on{background:#14532d;border-color:#166534;box-shadow:0 0 0 1px #166534;}
.pp.on .pn{color:#86efac;}
.pp.on .pr{color:#4ade80;}
.pp.nxt{opacity:.6;}
.pp.nxt .pn{color:#bbb;}
.pp.is-btn::after{content:'D';position:absolute;top:-4px;right:-3px;width:11px;height:11px;border-radius:50%;background:#f0c040;color:#000;font-size:6px;font-weight:800;line-height:11px;text-align:center;}

/* ─ 매트릭스 ─ */
#matrix-wrap{padding:6px 6px 3px;overflow-x:auto;-webkit-overflow-scrolling:touch;width:100%;}
.mgrid{display:grid;grid-template-columns:var(--cl) repeat(13,var(--cs));grid-template-rows:var(--cl) repeat(13,var(--cs));gap:1px;width:100%;}
.ml{display:flex;align-items:center;justify-content:center;font-size:var(--mf,8px);color:#777;font-family:monospace;}
.mc{display:flex;align-items:center;justify-content:center;border-radius:2px;font-size:var(--mf,7px);font-family:monospace;cursor:pointer;user-select:none;-webkit-user-select:none;transition:transform .08s;position:relative;}
.mc:active{transform:scale(.85);}
.mc.sel::after{content:'';position:absolute;inset:0;border-radius:2px;outline:2px solid #f0c040;outline-offset:-1px;}
.c-out{background:#060606;color:#282828;}
.c-weak{background:#0f0f0f;color:#333;}
.c-allin{background:#3d0e0e;color:#fca5a5;}
.c-raise{background:#2c1800;color:#fbbf24;}
.c-tbet{background:#2c0f00;color:#fb923c;}
.c-tbet-w{background:#1a0900;color:#c2621a;}
.c-call{background:#0a1a32;color:#60a5fa;}
.c-call-w{background:#060f1e;color:#5a8fd4;}
.c-limp{background:#091e0c;color:#4ade80;}
.c-limp-w{background:#060f07;color:#1e6128;}

/* ─ 범례 ─ */
#legend{display:flex;flex-wrap:wrap;gap:3px 7px;padding:5px 11px;border-top:0.5px solid #141414;}
.li{display:flex;align-items:center;gap:3px;font-size:9px;color:#ccc;}
.ld{width:8px;height:8px;border-radius:1px;flex-shrink:0;}

/* ─ 플랍 분석 섹션 ─ */
#flop-section{margin:8px 11px;border:1.5px solid #166534;border-radius:10px;overflow:hidden;box-shadow:0 0 14px rgba(22,101,52,.35);}
#flop-hdr{display:flex;align-items:center;justify-content:space-between;padding:10px 12px;background:#0a1a0e;cursor:pointer;}
#flop-hdr-left{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:700;color:#4ade80;}
#flop-hdr-right{display:flex;align-items:center;gap:6px;}
#flop-toggle{font-size:12px;color:#4ade80;}
#flop-body{background:#080808;padding:10px;}
#flop-body.hidden{display:none;}
.flop-row{display:flex;align-items:center;gap:6px;margin-bottom:8px;}
.flop-row-label{font-size:10px;color:#888;flex-shrink:0;width:52px;font-weight:600;}
/* 카드 입력 */
.card-slot{display:flex;align-items:center;gap:3px;background:#0f0f0f;border:1.5px solid #2a2a2a;border-radius:8px;padding:7px 10px;cursor:pointer;justify-content:center;}
.card-rank{font-size:16px;font-weight:700;font-family:monospace;}
.card-suit{font-size:16px;}
.card-slot.active{border-color:#4ade80;}
/* 카드 선택 패널 */
#card-picker{background:#0f0f0f;border:0.5px solid #1a1a1a;border-radius:7px;padding:8px;margin-bottom:8px;display:none;}
#card-picker.show{display:block;}
.picker-ranks{display:flex;flex-wrap:wrap;gap:3px;margin-bottom:6px;}
.pr-btn{width:30px;height:32px;border-radius:5px;background:#1a1a1a;border:0.5px solid #2a2a2a;color:#bbb;font-size:12px;font-weight:700;font-family:monospace;}
.pr-btn.on{background:#14532d;color:#86efac;}
.picker-suits{display:flex;gap:4px;}
.ps-btn{width:44px;height:34px;border-radius:5px;background:#1a1a1a;border:0.5px solid #2a2a2a;font-size:20px;}
.ps-btn.on{border-color:#4ade80;background:#0a1a0e;}
/* 플랍 분석 결과 */
#flop-result{margin-top:2px;}
.fr-texture{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:8px;}
.tex-badge{padding:2px 7px;border-radius:4px;font-size:9px;font-weight:700;}
.fr-section-title{font-size:10px;color:#888;margin-bottom:5px;margin-top:8px;font-weight:600;}
.range-item{display:flex;align-items:center;gap:6px;padding:6px 9px;background:#111;border-radius:6px;margin-bottom:4px;border:0.5px solid #1a1a1a;}
.ri-hand{font-size:12px;font-weight:700;font-family:monospace;min-width:80px;color:#ddd;}
.ri-bar-wrap{flex:1;height:6px;background:#141414;border-radius:3px;overflow:hidden;}
.ri-bar{height:100%;border-radius:3px;}
.ri-prob{font-size:10px;font-weight:700;min-width:28px;text-align:right;}
.ri-desc{font-size:9px;color:#888;min-width:60px;}
/* 내 핸드 평가 */
#my-hand-eval{padding:7px;background:#0a1a0e;border-radius:7px;border:0.5px solid #166534;margin-top:8px;}
#mhe-title{font-size:10px;color:#888;margin-bottom:4px;font-weight:600;}
#mhe-result{font-size:15px;font-weight:700;}
#mhe-equity{font-size:10px;margin-top:3px;}
#mhe-action{font-size:11px;color:#f0c040;margin-top:3px;font-weight:600;}

/* ─ 시트 ─ */
#si{padding:14px 14px 14px;}
#sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:6px;}
#s-hand{font-size:24px;font-weight:700;font-family:monospace;color:#86efac;line-height:1;}
#s-sub{font-size:9px;color:#2a2a2a;margin-top:2px;}

#close-btn{width:28px;height:28px;border-radius:50%;background:#1a1a1a;color:#888;font-size:18px;display:flex;align-items:center;justify-content:center;flex-shrink:0;}
#s-top-action{font-size:13px;font-weight:700;padding:2px 10px;border-radius:5px;display:inline-block;}
#s-hand{font-size:30px;font-weight:700;font-family:monospace;color:#86efac;line-height:1;flex-shrink:0;}
#sh{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;}

/* 메인 액션 바 */
.sheet-section-title{font-size:9px;color:#aaa;margin-bottom:4px;margin-top:8px;letter-spacing:.3px;}
.ar{display:flex;align-items:center;gap:6px;margin:4px 0;}
.albl{font-size:10px;font-weight:700;width:90px;flex-shrink:0;line-height:1.2;}
.anote{font-size:8px;font-weight:400;color:#444;display:block;}
.abg{flex:1;height:18px;background:#141414;border-radius:3px;overflow:hidden;position:relative;}
.abar{height:100%;border-radius:3px;transition:width .3s cubic-bezier(.4,0,.2,1);}
.a-pct-in{position:absolute;left:5px;top:50%;transform:translateY(-50%);font-size:9px;font-weight:700;color:rgba(0,0,0,.7);mix-blend-mode:normal;z-index:1;}
.apct{font-size:11px;font-weight:700;width:32px;text-align:right;flex-shrink:0;}

/* 레이즈 크기 비교 패널 (이미지 스타일) */
#raise-compare{display:flex;gap:6px;margin-top:8px;}
.rc-panel{flex:1;background:#0c0c0c;border-radius:6px;border:0.5px solid #1a1a1a;padding:7px;min-width:0;}
.rc-title{font-size:9px;color:#ccc;margin-bottom:5px;text-align:center;}
.rc-row{display:flex;align-items:center;gap:4px;margin:3px 0;}
.rc-lbl{font-size:9px;font-weight:700;width:46px;flex-shrink:0;}
.rc-bar-wrap{flex:1;height:14px;background:#141414;border-radius:2px;overflow:hidden;}
.rc-bar{height:100%;border-radius:2px;}
.rc-num{font-size:9px;font-weight:700;width:24px;text-align:right;flex-shrink:0;}

/* 포지션별 비교 테이블 */
#pos-table{margin-top:8px;overflow-x:auto;}
.pt-table{width:100%;border-collapse:collapse;}
.pt-table th{font-size:8px;color:#ccc;padding:3px 4px;text-align:center;font-weight:700;border-bottom:0.5px solid #1a1a1a;}
.pt-table td{font-size:9px;padding:3px 4px;text-align:center;border-bottom:0.5px solid #0d0d0d;}
.pt-table tr.cur-row td{background:#0a1a0e;}
.pt-table td:first-child{font-family:monospace;font-weight:700;color:#4ade80;text-align:left;}
.pt-table tr.cur-row td:first-child{color:#86efac;}
.mini-bar-wrap{height:8px;background:#141414;border-radius:2px;overflow:hidden;display:flex;}
.mini-bar-r{height:100%;background:#ba7517;}
.mini-bar-c{height:100%;background:#378aDD;}
.mini-bar-f{height:100%;background:#1e1e1e;}

#s-tip{padding:9px 11px;background:#0a1a0e;border-radius:8px;font-size:11px;color:#e0e0e0;line-height:1.65;border-left:3px solid #4ade80;margin-top:8px;}

/* ─ 오버레이 / 모달 ─ */
#shield{display:none;position:fixed;inset:0;background:#000;z-index:9999;flex-direction:column;align-items:center;justify-content:center;}
#shield.on{display:flex;}
#sh-hint{color:#111;font-size:12px;transition:opacity 2s;}
#sh-hint.fade{opacity:0;}

#balert{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);background:#0e0800;border:1px solid #f97316;border-radius:12px;padding:18px 24px;text-align:center;z-index:8000;}
#balert.show{display:block;animation:pop .25s ease;}
#ba-lbl{font-size:11px;color:#f97316;font-weight:700;margin-bottom:4px;}
#ba-val{font-size:22px;font-weight:700;font-family:monospace;color:#fbbf24;}
#ba-sub{font-size:9px;color:#555;margin-top:3px;}

/* 🚀 올인 찬스 팝업 */
#allin-popup{display:none;position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);z-index:8500;background:#1a0000;border:2px solid #ef4444;border-radius:16px;padding:18px 28px;text-align:center;min-width:200px;}
#allin-popup.show{display:block;animation:pop .2s ease;}
#ap-icon{font-size:36px;margin-bottom:4px;}
#ap-title{font-size:18px;font-weight:700;color:#ef4444;margin-bottom:6px;}
#ap-pct{font-size:32px;font-weight:700;font-family:monospace;color:#fca5a5;}
#ap-sub{font-size:10px;color:#666;margin-top:4px;}
#ap-ok{margin-top:14px;padding:8px 24px;background:#ef4444;color:#000;border-radius:8px;font-size:13px;font-weight:700;}

#brkovl{display:none;position:fixed;inset:0;background:rgba(0,0,0,.94);z-index:7000;flex-direction:column;align-items:center;justify-content:center;}
#brkovl.on{display:flex;}
#brk-cd{font-size:56px;font-weight:700;font-family:monospace;color:#f0c040;margin:12px 0;}
#brk-end-btn{margin-top:16px;padding:8px 22px;background:#222;border-radius:8px;color:#888;font-size:12px;font-weight:700;}

@keyframes pop{from{transform:translate(-50%,-50%) scale(.8);opacity:0}to{transform:translate(-50%,-50%) scale(1);opacity:1}}

/* ─ 하단 눈팅방지 버튼 ─ */
#shield-fixed-btn{position:fixed;bottom:env(safe-area-inset-bottom,0);left:0;right:0;z-index:5500;background:#0a0a0a;border-top:0.5px solid #1a1a1a;padding:8px 0 calc(8px + env(safe-area-inset-bottom,0));display:flex;justify-content:center;}
#shield-fixed-btn button{width:100%;max-width:100%;margin:0 11px;height:36px;background:#111;border:0.5px solid #2a2a2a;border-radius:8px;color:#666;font-size:12px;font-weight:700;letter-spacing:.3px;}
#shield-fixed-btn button:active{background:#1a1a1a;}
</style>
</head>

<div id="app">
<div id="hdr">

        <span id="t-lvl">Lv.1</span>
        <span id="t-blind">100/200</span>

    <!-- 줄3: 현재칩 / 칩리더 / 빌런 / 브레이크 -->

        <button id="brk-btn" onclick="toggleBreak()">☕</button>

</div><!-- /hdr -->

function getTip(hand,pi,sc,stk){
  const t=HT[hand]||7;
  const bbCount=(stk&&stk.bbCount)||0;
  const limpers=S.limpers||0;
  const isShort=bbCount>0&&bbCount<=20;
  const isCritical=bbCount>0&&bbCount<=12;
  const isDeep=bbCount>60;
  const posN=['EP','MP','CO','BTN','SB','BB'][pi];
  const isBB=pi===5;
  const tipObj=TIPS[hand];
  const scKey=sc==='fi'?'fi':sc==='allin'?'allin':sc==='rr'?'rr':'vr';
  let base=tipObj?(tipObj[scKey]||tipObj.fi||''):
    t<=2?'프리미엄 핸드. 레이즈 or 올인.':
    t<=4?'강한 핸드. 포지션에 따라 레이즈.':
    t<=5?'중간 핸드. 레이즈 or 폴드 이분법.':
    t<=6?'투기적 핸드. LP에서만 레이즈.':
    '약한 핸드. 대부분 폴드.';
  const stackNote=isCritical?` ⚡ ${bbCount}BB 단기전: 올인 or 폴드만.`:
    isShort?` 🟡 ${bbCount}BB 단기: 2.5BB 오픈권.`:
    isDeep?' 💙 딥스택: 수티드 커넥터·셋 마이닝 가치 상승.':'';
  let limpNote='';
  if(limpers>0){
    if(sc==='fi'){
      limpNote=t<=3?` 🎯 앞에 ${limpers}명 림프: 5BB 아이소 레이즈로 스퀴즈.`:
               t<=5?` ⚡ 앞에 ${limpers}명 림프: 강하면 아이소 레이즈, 약하면 폴드.`:
               ` ✂️ 앞에 ${limpers}명 림프: 폴드. 멀티웨이에서 엣지 없음.`;
    }else{
      limpNote=t<=2?` 🚀 ${limpers}명 콜 후 내 차례: 스퀴즈 올인 찬스!`:
               t<=4?` ⚡ ${limpers}명 콜 확인: 스퀴즈 3벳 or 폴드. 콜 금지.`:
               ` ✂️ ${limpers}명 콜 확인: 폴드. 스퀴즈 에쿼티 없음.`;
    }
  }
  const posNote=sc==='fi'&&!isBB&&t>=5&&pi<=1?' EP에서는 이 핸드 기본 폴드.':'';
  let modeNote='';
  const mAdj2=getModeAdj();
  if(S.villain){
    modeNote=' 🦹 빌런 대응: 비프리미엄 모두 폴드. 강한 핸드만 올인/3벳. 콜 금지.';
  }else if(S.mode==='mini'){
    modeNote=' 🔥 미니데일리: 어그레시브 테이블. 림프어 많으면 아이소 레이즈 필수. 블러프 캐처 조심.';
  }else if(S.mode==='high'){
    modeNote=' 👑 하이롤러: 앤티 있음. 타이트하게. BTN 스틸 적극 활용.';
  }else if(S.mode==='trn'&&mAdj2.ante){
    modeNote=' 🏆 앤티: BB가 BB금액 추가 납부. BB 디펜스 넓히고 BTN 스틸 추가.';
  }
  let chipNote='';
  if(S.chipLeader){chipNote=' 👑 칩리더: 수티드 커넥터·셋 마이닝 추가. 블러프 기회 확대. 버블·단기 약자 스틸 적극.';}
  return base+stackNote+limpNote+posNote+modeNote+chipNote;
}

function handName(r,c){
  if(r===c)return RANKS[r]+RANKS[r];
  if(r<c)return RANKS[r]+RANKS[c]+'s';
  return RANKS[c]+RANKS[r]+'o';
}
function baseFi(hand,pi){
  if(HA[hand])return[...HA[hand].fi[pi]];
  const t=HT[hand]||7,mFI=[3,3,5,6,5,6];
  if(t>mFI[pi])return[0,0,0,100];
  const b=[88,90,88,85,80,75][Math.min(t-1,5)];
  const a0=[15,5,0,0,0,0][Math.min(t-1,5)];
  const al=Math.min(35,a0+pi*2),ra=Math.max(50,Math.min(95,b+pi-al+a0));
  return[ra,al,0,Math.max(0,100-ra-al)];
}
function baseVr(hand,pi){
  if(HA[hand])return[...HA[hand].vr[pi]];
  const t=HT[hand]||7,mVR=[2,2,4,4,4,5];
  if(t>mVR[pi])return[0,0,100];
  const b3=[80,40,15,3,0,0][Math.min(t-1,5)];
  const bC=[18,55,60,30,0,0][Math.min(t-1,5)];
  const tb=Math.min(90,b3+pi*3),ca=Math.min(70,Math.max(0,bC-pi*2));
  return[tb,ca,Math.max(0,100-tb-ca)];
}

function applyMultiway(acts,sc,hand,n){
  if(n<=2)return acts;
  const extra=n-2;
  const t=HT[hand]||7;
  const isStrong=t<=2;
  const isMarginal=t>=5;
  if(sc==='fi'){
    let[r,al,l,f]=acts;
    if(isStrong)return acts;
    if(isMarginal){
      const fBonus=Math.min(f+extra*7,95);
      const diff=fBonus-f;
      l=Math.max(0,l-Math.round(diff*.6));
      r=Math.max(0,r-Math.round(diff*.4));
      f=Math.max(0,100-r-al-l);
    }else{
      const bonus=extra*4;
      f=Math.min(f+Math.round(bonus*.5),95);
      r=Math.max(0,100-f-al-l);
    }
    return[r,al,l,f];
  }else{
    let[t2,c,f]=acts;
    if(isStrong)return acts;
    const fBonus=extra*5;
    c=Math.max(0,c-Math.round(fBonus*.4));
    t2=Math.max(0,t2-Math.round(fBonus*.3));
    f=Math.max(0,100-t2-c);
    return[t2,c,f];
  }
}

const VILLAIN_ADJ={fi_fold:-20, vr3:1.4, vrc:0.3};

function getModeAdj(){
  const base=MODE_ADJ[S.mode]||MODE_ADJ.trn;
  if(!S.villain)return base;
  return{
    fi_fold: base.fi_fold + VILLAIN_ADJ.fi_fold,
    vr3: base.vr3 * VILLAIN_ADJ.vr3,
    vrc: base.vrc * VILLAIN_ADJ.vrc,
    ante: base.ante,
    label: base.label+'+빌런',
    desc: '빌런 대응: 프리미엄만, 비프리미엄 폴드'
  };
}

function applyAnteAdj(acts,sc,pi,isAnteMode){
  if(!isAnteMode)return acts;
  if(sc==='fi'){
    let[r,al,l,f]=acts;
    if(pi===5){
      const bonus=Math.min(f*.25,18);r=Math.round(r+bonus*.4);l=Math.round(l+bonus*.6);f=Math.max(0,100-r-al-l);
    }else if(pi===3||pi===2){
      const bonus=Math.min(f*.12,8);r=Math.round(r+bonus);f=Math.max(0,100-r-al-l);
    }
    return[r,al,l,f];
  }
  return acts;
}

const ALLIN_HU={
  'AA':100,'KK':100,'QQ':99,'JJ':97,'TT':93,
  '99':87,'88':80,'77':73,'66':65,'55':57,'44':50,'33':44,'22':38,
  'AKs':99,'AQs':94,'AJs':88,'ATs':82,'A9s':74,'A8s':68,'A7s':62,
  'A6s':57,'A5s':60,'A4s':55,'A3s':52,'A2s':49,
  'AKo':97,'AQo':90,'AJo':83,'ATo':75,
  'KQs':82,'KJs':75,'KTs':68,'K9s':58,'K8s':50,'K7s':42,
  'KQo':76,'KJo':68,'KTo':58,'K9o':47,
  'QJs':70,'QTs':63,'Q9s':54,'JTs':66,'J9s':57,'T9s':62,
  '98s':57,'87s':52,'76s':48,'65s':45,'54s':42,
  'QJo':62,'JTo':57,'T9o':52,
};

function getAllinCall(hand,nPlayers){
  const baseCall=ALLIN_HU[hand]||(HT[hand]<=2?85:HT[hand]<=3?70:HT[hand]<=4?55:HT[hand]<=5?40:25);
  const multi=Math.max(0,nPlayers-2);
  const adj=multi*9;
  return Math.max(0,Math.min(100,baseCall-adj));
}

function getActs(hand,pi,sc,nPlayers){
  nPlayers=nPlayers||S.potPlayers;
  const limpers=S.limpers||0;
  const isPub=S.mode==='pub'||S.mode==='mini'||S.mode==='daily';
  const mAdj=getModeAdj();
  const t=HT[hand]||7;
  const isBB=pi===5;

  if(sc==='fi'){
    const mFI=[3,3,5,6,5,6];
    let[r,al,l,f]=baseFi(hand,pi);
    if(!isBB){f+=l;l=0;}
    {
      const gap=t-mFI[pi];
      const fd=mAdj.fi_fold;
      if(gap===1&&isBB&&isPub)l=Math.min(30,l+20);
      else if(gap<=0&&f>0&&fd>0){
        const bn=Math.min(f*(fd/100)*2.2,fd*.8);
        r=Math.round(r+bn*.6);if(isPub)l=Math.round(l+bn*.4);f=Math.max(0,100-r-al-l);
      }else if(fd<0&&f<95){
        const tight=Math.min(Math.abs(fd)*0.8,15);
        f=Math.min(95,f+tight);r=Math.max(0,r-tight*.7);al=Math.max(0,al-tight*.3);
      }
      {const _a=applyAnteAdj([r,al,l,f],sc,pi,mAdj.ante);r=_a[0];al=_a[1];l=_a[2];f=_a[3];}
      if(S.chipLeader&&f>0&&t<=6){
        const bonus=Math.min(f*.20,14);
        r=Math.round(r+bonus*.7);if(isBB)l=Math.round(l+bonus*.3);
        f=Math.max(0,100-r-al-l);
      }
    }
    if(S.mode==='mini'&&!isBB&&f>0&&t<=4){
      const bn=Math.min(f*.18,12);r=Math.round(r+bn);f=Math.max(0,100-r-al-l);
    }
    if(limpers>0){
      if(t<=3){r=Math.min(r+limpers*4,92);al=Math.min(al+limpers*2,30);}
      else if(t<=5){const tight=limpers*7;r=Math.max(0,r-tight*.4);f=Math.min(98,f+tight*.6);}
      else{f=Math.min(98,f+limpers*10);r=Math.max(0,100-f-al-l);}
      f=Math.max(0,100-r-al-l);
    }
    let a=[r,al,l,f];
    a=applyMultiway(a,sc,hand,nPlayers);
    return a;
  }

  let[tv,cv,fv]=baseVr(hand,pi);
  const adj=RADJ[sc]||{t:1,c:1};
  tv=Math.min(90,Math.round(tv*adj.t));
  cv=Math.min(50,Math.round(cv*adj.c*.60));
  fv=Math.max(0,100-tv-cv);
  if(t<=1&&sc!=='allin'){tv=Math.max(tv,55);cv=Math.min(cv,35);fv=Math.max(0,100-tv-cv);}
  else if(t===2&&sc!=='allin'){tv=Math.max(tv,40);cv=Math.min(cv,45);fv=Math.max(0,100-tv-cv);}
  tv=Math.min(88,Math.round(tv*mAdj.vr3));
  cv=Math.min(60,Math.round(cv*mAdj.vrc));
  fv=Math.max(0,100-tv-cv);
  if(limpers>0&&sc!=='allin'){
    if(t<=1){tv=Math.min(88,tv+limpers*12);cv=Math.max(0,limpers>=3?0:cv-limpers*10);}
    else if(t<=2){tv=Math.min(82,tv+limpers*8);cv=Math.max(0,cv-limpers*8);}
    else if(t<=4){tv=Math.max(0,tv-limpers*4);cv=Math.max(0,cv-limpers*10);}
    else{cv=Math.max(0,cv-limpers*12);tv=Math.max(0,tv-limpers*5);}
    fv=Math.max(0,100-tv-cv);
  }
  let a=[tv,cv,fv];
  if(sc==='allin'){
    const huCall=getAllinCall(hand,nPlayers);
    return[huCall,Math.max(0,100-huCall)];
  }
  a=applyMultiway(a,sc,hand,nPlayers);
  return a;
}

function cellCls(hand,pi,sc){
  const a=getActs(hand,pi,sc);
  if(sc==='fi'){
    const[r,al,l,f]=a;
    if(f>=99)return'out';if(f>=72)return'weak';
    if(al>=12)return'allin';if(r+al>=55)return'raise';
    if(l>=25)return'limp';if(l>=8)return'limp-w';
    return'weak';
  }
  if(sc==='allin'){const[c]=a;if(c<20)return'out';if(c<40)return'call-w';if(c<70)return'call';return'allin';}
  const[t,c,f]=a;
  const fThreshold=S.villain?70:80;
  if(f>=98)return'out';if(f>=fThreshold)return'weak';
  if(t>=25)return'tbet';if(c>=25)return'call';
  if(t>=10)return'tbet-w';if(c>=10)return'call-w';
  return'weak';
}

function fmtC(n){if(n>=1000000)return(n/1000000).toFixed(1)+'M';if(n>=1000)return Math.round(n/100)/10+'K';return n;}

  const bbCount=Math.round(chips/bb);

}
function zoneBadge(stk){
  const z={critical:{txt:`🔴 ${stk.bbCount}BB`,col:'#fca5a5',bg:'#2d0808'},short:{txt:`🟡 ${stk.bbCount}BB`,col:'#fbbf24',bg:'#2d1800'},normal:{txt:`🟢 ${stk.bbCount}BB`,col:'#4ade80',bg:'#091e0c'},deep:{txt:`💙 ${stk.bbCount}BB`,col:'#60a5fa',bg:'#06101e'}};
  return z[stk.zone]||{txt:'?',col:'#aaa',bg:'#111'};
}
function updateZoneBadge(){

  if(el){el.textContent=z.txt;el.style.color=z.col;el.style.background=z.bg;el.style.borderColor=z.col+'33';}
}
function updateBBDisplay(){

function getDetailedBars(hand,pi,sc){
  const raw=getActs(hand,pi,sc);
  const stk=getStackInfo();
  const bbNow=S.bbNow||200,chips=S.curChip||0;
  const bbCount=stk.bbCount;
  const note=v=>chips>0?fmtC(v):'';
  if(sc==='fi'){
    const[r,al,l,f]=raw;
    const mult=bbCount>0&&bbCount<=30?2.5:3;
    const raAmt=bbNow*mult;
    const isBB=pi===5;
    const items=[];
    if(bbCount>0&&bbCount<=12){
      const push=Math.min(93,al+r);
      return[{l:'올인 (push)',v:Math.round(push),c:'#E24B4A',eq:62,note:chips?fmtC(chips):'전체'},{l:'폴드',v:100-Math.round(push),c:'#555',eq:0}].filter(b=>b.v>0);
    }
    if(al>0)items.push({l:'올인',v:al,c:'#E24B4A',eq:68,note:chips?fmtC(chips):'전체'});
    if(r>0)items.push({l:`오픈 ${mult}x`,v:r,c:'#ba7517',eq:56,note:chips?`≈${fmtC(raAmt)}`:`${mult}BB`});
    if(l>0)items.push({l:isBB?'체크':'림프',v:l,c:'#4ade80',eq:48,note:isBB?'무료플랍':(chips?fmtC(bbNow):`1BB`)});
    if(f>0)items.push({l:'폴드',v:f,c:'#555',eq:0});
    return items.filter(b=>b.v>0);
  }
  if(sc==='allin'){
    const[c,f]=raw;
    return[{l:'콜 (올인)',v:c,c:'#378ADD',eq:45,note:chips?fmtC(chips):'전체'},{l:'폴드',v:f,c:'#555',eq:0}].filter(b=>b.v>0);
  }
  let[t,c,f]=raw;
  const rBB={r2:2,r3:3,r4:4,r5:5,r10:10}[sc]||3;
  const items=[];
  if(sc==='rr'){
    const fourBet=Math.round(t*.55);
    const shove=t-fourBet;
    if(bbCount>0&&bbCount<=35){
      items.push({l:'올인 (5벳shove)',v:t,c:'#E24B4A',eq:55,note:chips?fmtC(chips):'전체'});
    }else{
      if(fourBet>0)items.push({l:'4벳 리레이즈',v:fourBet,c:'#E24B4A',eq:52,note:chips?`≈${fmtC(bbNow*16)}`:'16BB'});
      if(shove>0)items.push({l:'올인 (5벳)',v:shove,c:'#D85A30',eq:48,note:'전체'});
    }
    if(c>0)items.push({l:'콜 (flat)',v:c,c:'#378ADD',eq:44,note:'트랩 전략'});
  }else if(sc==='r10'){
    const shove=Math.round(t*.7);
    if(shove>0)items.push({l:'올인/3벳shove',v:shove,c:'#E24B4A',eq:50,note:chips?fmtC(chips):'전체'});
    const cc=Math.round(c*.5);
    if(cc>0)items.push({l:'콜',v:cc,c:'#378ADD',eq:40,note:chips?fmtC(bbNow*10):`${rBB}BB`});
    const ff=Math.max(0,100-shove-cc);
    if(ff>0)items.push({l:'폴드',v:ff,c:'#555',eq:0});
    return items.filter(b=>b.v>0);
  }else{
    const shoveTop=Math.round(t*.25);
    const threeBet=t-shoveTop;
    if(shoveTop>0)items.push({l:'올인 (4벳shove)',v:shoveTop,c:'#E24B4A',eq:55,note:chips?fmtC(chips):'전체'});
    if(threeBet>0)items.push({l:'3벳',v:threeBet,c:'#D85A30',eq:50,note:chips?`≈${fmtC(bbNow*rBB*3)}`:`${rBB*3}BB`});
    if(c>0)items.push({l:'콜',v:c,c:'#378ADD',eq:44,note:chips?fmtC(bbNow*rBB):`${rBB}BB`});
  }
  if(f>0)items.push({l:'폴드',v:f,c:'#555',eq:0});
  return items.filter(b=>b.v>0);
}

function getRaiseCompareData(hand,pi){
  function panel(sc){
    const a=getActs(hand,pi,sc);
    const[t,c,f]=a;
    const lbl=sc==='r2'?'2BB':sc==='r3'?'3BB':sc==='r5'?'5BB':'10BB';
    const shove=Math.round(t*.25),threebet=t-shove;
    return{lbl,shove,threebet,call:c,fold:f};
  }
  return{small:panel('r3'),big:panel('r5')};
}

function getPosTableData(hand,sc){
  return[0,1,2,3,4,5].map(pi=>{
    const a=getActs(hand,pi,sc);
    if(sc==='fi'){const[r,al,l,f]=a;return{pi,raise:r+al,call_limp:l,fold:f};}
    if(sc==='allin'){const[c,f]=a;return{pi,raise:0,call_limp:c,fold:f};}
    const[t,c,f]=a;
    return{pi,raise:t,call_limp:c,fold:f};
  });
}

function renderMatrix(){

  const bbCount=stk.bbCount;
  let stkParts=[];
  if(bbCount>0){const z=zoneBadge(stk);stkParts.push(z.txt);}

  const _sh=document.getElementById('s-hand');if(_sh)_sh.textContent=hand;
  const _ssub=document.getElementById('s-sub');if(_ssub)_ssub.textContent=type+' · '+PFULL[pi]+' · '+scLabel+' · '+(S.mode==='trn'?'🏆대회':'🍺펍');
  const _ssi=document.getElementById('s-stack-info');
  if(_ssi)_ssi.innerHTML=stkParts.map((p,i)=>`<span style="color:${i===0?'#4ade80':'#bbb'}">${p}</span>`).join('<span style="color:#333;margin:0 4px;">·</span>');

  document.getElementById('acts').innerHTML=bars.map(b=>`

    };

  }else if(rcWrap){rcWrap.style.display='none';}

  S.hand=hand;
  document.querySelectorAll('.mc').forEach(el=>el.classList.toggle('sel',el.dataset.hand===hand));
  renderSheet();
}

/* ════════════════ 타이머 ════════════════ */
function parseMM(s){const m=s.match(/^(\d{1,2}):?(\d{0,2})$/);return m?(+m[1]*60+(+m[2]||0)):0;}
function fmtSec(s){return String(Math.floor(s/60)).padStart(2,'0')+':'+String(s%60).padStart(2,'0');}
function fmtTime(el){
  let v=el.value.replace(/\D/g,'').substring(0,4);
  if(v.length>=3)v=v.substring(0,2)+':'+v.substring(2);
  el.value=v;
  if(el.id==='brk-t-in')return;
  if(!S.timerRunning)resetTimer();
}
function updateTimerUI(){
  const isB=S.breakActive;
  const left=isB?S.breakLeft:S.timerLeft;
  const el=document.getElementById('t-time');
  el.textContent=fmtSec(left);
  el.style.color=left<=30?'#f87171':isB?'#d4a017':'#f0c040';
  document.getElementById('t-lvl').textContent=isB?'☕':('Lv.'+S.blindLevel);
  const fmt=n=>n>=1000?Math.round(n/100)/10+'K':n;
  document.getElementById('t-blind').textContent=fmt(S.sbNow)+'/'+fmt(S.bbNow);
  const total=isB?S.breakTotal:S.timerTotal;
  const pct=total>0?left/total*100:0;
  const bar=document.getElementById('tbar');
  bar.style.width=pct+'%';
  bar.style.background=left<=30?'#ef4444':left<=60?'#f97316':isB?'#d4a017':'#4ade80';
  // 요약바 타이머 동기화
  const sumT=document.getElementById('sum-timer');
  if(sumT)sumT.textContent=fmtSec(left);
  const sumLvl=document.getElementById('sum-lvl-info');
  const fmtQ=n=>n>=1000?Math.round(n/100)/10+'K':n;
  if(sumLvl)sumLvl.textContent='Lv.'+S.blindLevel+' '+fmtQ(S.sbNow)+'/'+fmtQ(S.bbNow);
  // btn-start 동기화
  const startBtn=document.getElementById('btn-start');
  if(startBtn){
    if(S.timerRunning){startBtn.textContent='⏸ 정지';startBtn.style.cssText='flex:1;height:28px;border-radius:6px;background:#3d1400;color:#fdba74;border:0.5px solid #7c2d12;font-size:11px;font-weight:700;';}
    else{startBtn.textContent='▶ 스타트';startBtn.style.cssText='flex:1;height:28px;border-radius:6px;background:#14532d;color:#86efac;border:0.5px solid #166534;font-size:11px;font-weight:700;';}
  }
}
function resetTimer(){
  clearInterval(S.timerInterval);S.timerRunning=false;
  S.blindLevel=1;S.sbNow=S.sbBase;S.bbNow=S.bbBase;
  S.timerTotal=parseMM(document.getElementById('t1').value)||360;
  S.timerLeft=S.timerTotal;
  updateTimerUI();
  document.getElementById('sb').value=S.sbBase;
  document.getElementById('bb').value=S.bbBase;
}
function toggleTimer(){
  if(S.timerRunning){
    clearInterval(S.timerInterval);S.timerRunning=false;
    updateTimerUI();
  }else{
    S.timerRunning=true;
    updateTimerUI();
    S.timerInterval=setInterval(()=>{
      if(S.breakActive)return;
      S.timerLeft--;
      if(S.timerLeft<=0){
        S.blindLevel++;S.sbNow*=2;S.bbNow*=2;
        S.timerTotal=parseMM(document.getElementById('tn').value)||360;
        S.timerLeft=S.timerTotal;
        document.getElementById('sb').value=S.sbNow;
        document.getElementById('bb').value=S.bbNow;
        const fmt=n=>n>=1000?Math.round(n/100)/10+'K':n;
        document.getElementById('ba-val').textContent=fmt(S.sbNow)+' / '+fmt(S.bbNow);
        document.getElementById('ba-sub').textContent='레벨 '+S.blindLevel+' 시작';
        document.getElementById('balert').classList.add('show');
        if(navigator.vibrate)navigator.vibrate([100,60,100,60,200]);
        updateZoneBadge();updateBBDisplay();updateSummaryBar();
      }
      updateTimerUI();
    },1000);
  }
}
function toggleBreak(){
  if(S.breakActive){endBreak();return;}
  S.breakTotal=parseMM(document.getElementById('brk-t-in').value)||900;
  S.breakLeft=S.breakTotal;
  S.breakActive=true;
  document.getElementById('brk-btn').classList.add('active');
  document.getElementById('brkovl').classList.add('on');
  document.getElementById('brk-cd').textContent=fmtSec(S.breakLeft);
  S.breakInterval=setInterval(()=>{
    S.breakLeft--;
    document.getElementById('brk-cd').textContent=fmtSec(Math.max(0,S.breakLeft));
    updateTimerUI();
    if(S.breakLeft<=0)endBreak(true);
  },1000);
}
function endBreak(auto=false){
  clearInterval(S.breakInterval);S.breakActive=false;
  document.getElementById('brk-btn').classList.remove('active');
  document.getElementById('brkovl').classList.remove('on');

function analyzeBoard(cards){
  const parsed=cards.map(c=>({r:RVAL[c[0]],s:c[1],str:c}));
  const rs=parsed.map(c=>c.r).sort((a,b)=>b-a);
  const ss=parsed.map(c=>c.s);
  const sc={};ss.forEach(s=>sc[s]=(sc[s]||0)+1);
  const maxS=Math.max(...Object.values(sc));
  const mono=maxS===3,twoTone=maxS===2,rainbow=maxS===1;
  const paired=rs[0]===rs[1]||rs[1]===rs[2];
  const trips=rs[0]===rs[1]&&rs[1]===rs[2];
  const gaps=[rs[0]-rs[1],rs[1]-rs[2]];
  const connected=gaps.every(g=>g<=2);
  const oneGap=gaps.some(g=>g===0)||gaps.filter(g=>g===1).length>=2;
  const highCard=rs[0]>=12?'broadway':rs[0]>=10?'hi':rs[0]>=7?'mid':'low';
  return{parsed,rs,ss,paired,trips,mono,twoTone,rainbow,connected,oneGap,highCard,sc};
}

function inferOpponentRanges(tex,potPlayers,posKey){
  const{rs,paired,trips,mono,twoTone,connected,highCard}=tex;
  const ranges=[];
  const piKey=posKey||'BTN';
  const tight=piKey==='EP';
  const wide=piKey==='BTN'||piKey==='SB';
  if(!trips){
    rs.forEach(r=>{
      const pct=tight?8:wide?15:11;
      ranges.push({hand:`${RANKS[14-r]}${RANKS[14-r]} (셋)`,pct,c:'#E24B4A',desc:'레인지 내 포켓페어'});
    });
  }
  if(!paired){const pct=tight?6:wide?12:9;ranges.push({hand:`투페어`,pct,c:'#D85A30',desc:'두 보드카드 히트'});}
  {const topR=RANKS[14-rs[0]];const pct=tight?18:wide?28:22;ranges.push({hand:`탑페어 (${topR}x)`,pct,c:'#ba7517',desc:`${topR} 히트 핸드`});}
  if(rs[0]<13){const pct=tight?12:wide?9:10;ranges.push({hand:`오버페어 (AA~${RANKS[14-rs[0]-1]}${RANKS[14-rs[0]-1]})`,pct,c:'#7c3d0e',desc:'보드 위 포켓페어'});}
  if(mono||twoTone){const pct=tight?10:wide?18:14;ranges.push({hand:'플러시 드로',pct,c:'#378ADD',desc:mono?'모노톤 보드':'투톤 보드'});}
  if(connected){const pct=tight?8:wide?14:10;ranges.push({hand:'스트레이트 드로',pct,c:'#4ade80',desc:'커넥티드 보드 드로'});}
  {const pct=tight?38:wide?24:32;ranges.push({hand:'에어/오버카드',pct,c:'#444',desc:'미스 or 백도어'});}
  const total=ranges.reduce((s,r)=>s+r.pct,0);
  return ranges.map(r=>({...r,pct:Math.round(r.pct/total*100)})).sort((a,b)=>b.pct-a.pct);
}

function evalMyHandOnBoard(handStr,boardCards){
  if(!handStr)return null;
  const bCards=boardCards.map(c=>({r:RVAL[c[0]],s:c[1]}));
  const bRanks=bCards.map(c=>c.r).sort((a,b)=>b-a);
  const isPair=handStr.length===2&&handStr[0]===handStr[1];
  const isSuited=handStr.endsWith('s');
  const r1=RVAL[handStr[0]],r2=RVAL[handStr[1]];
  const myRanks=isPair?[r1,r1]:[r1,r2];
  if(isPair&&bRanks.includes(r1))return{strength:9,name:'셋!',emoji:'🎯',col:'#E24B4A',action:'밸류 올인/레이즈'};
  const hits2=myRanks.filter(r=>bRanks.includes(r));
  if(!isPair&&hits2.length>=2)return{strength:8,name:'투페어',emoji:'💪',col:'#D85A30',action:'레이즈/3벳'};
  if(hits2.length===1&&hits2[0]===bRanks[0])return{strength:7,name:'탑페어',emoji:'👍',col:'#ba7517',action:'베팅/콜'};
  if(hits2.length===1)return{strength:5,name:`미드/바텀페어(${RANKS[14-hits2[0]]})`,emoji:'😐',col:'#444',action:'팟 컨트롤'};
  if(isPair&&r1>bRanks[0])return{strength:7,name:`오버페어(${handStr})`,emoji:'💪',col:'#ba7517',action:'레이즈/베팅'};
  if(isSuited){
    const mySuit=handStr[handStr.length-1];
    const boardSuit=bCards.filter(c=>c.s===mySuit).length;
    if(boardSuit===3)return{strength:9,name:'플러시!',emoji:'🎨',col:'#E24B4A',action:'밸류 올인/레이즈'};
    if(boardSuit===2)return{strength:6,name:'넛 플러시 드로',emoji:'🎨',col:'#378ADD',action:'세미블러프/콜'};
  }
  const allRanks=[...myRanks,...bRanks].sort((a,b)=>b-a);
  const uniq=[...new Set(allRanks)];
  let maxRun=1,curRun=1;
  for(let i=1;i<uniq.length;i++){if(uniq[i-1]-uniq[i]<=2)curRun++;else curRun=1;maxRun=Math.max(maxRun,curRun);}
  if(maxRun>=4)return{strength:6,name:'스트레이트 드로',emoji:'🎰',col:'#60a5fa',action:'세미블러프/콜'};
  const overs=myRanks.filter(r=>r>bRanks[0]).length;
  if(overs===2)return{strength:4,name:'오버카드 2장',emoji:'🤔',col:'#2a4a2a',action:'블러프 가능'};
  if(overs===1)return{strength:3,name:'오버카드 1장',emoji:'😕',col:'#1e1e1e',action:'체크/폴드 경향'};
  return{strength:2,name:'에어 (미스)',emoji:'😰',col:'#1e1e1e',action:'블러프 or 폴드'};
}

function runFlopAnalysis(){
  const cards=S.flopCards.filter(c=>c);
  if(cards.length!==3)return;
  const tex=analyzeBoard(cards);
  const ranges=inferOpponentRanges(tex,S.potPlayers,S.posKey);
  const myHandEval=S.hand?evalMyHandOnBoard(S.hand,cards):null;
  const badges=[];
  if(tex.trips)badges.push({t:'트리플!',c:'#E24B4A',bg:'#2d0808'});
  else if(tex.paired)badges.push({t:'페어드',c:'#D85A30',bg:'#2d1000'});
  if(tex.mono)badges.push({t:'모노톤♣♦',c:'#60a5fa',bg:'#060f1e'});
  else if(tex.twoTone)badges.push({t:'투톤',c:'#3b6ca8',bg:'#040a12'});
  else badges.push({t:'레인보우',c:'#4ade80',bg:'#061006'});
  if(tex.connected)badges.push({t:'커넥티드',c:'#fbbf24',bg:'#1a1000'});
  if(tex.highCard==='broadway')badges.push({t:'하이보드',c:'#fca5a5',bg:'#1a0808'});
  else if(tex.highCard==='low')badges.push({t:'로우보드',c:'#4ade80',bg:'#061006'});
  let html=`<div class="fr-texture">${badges.map(b=>`<span class="tex-badge" style="color:${b.c};background:${b.bg};border:0.5px solid ${b.c}33;">${b.t}</span>`).join('')}</div>`;
  if(myHandEval){
    html+=`<div id="my-hand-eval">
      <div id="mhe-title">내 핸드 (${S.hand}) 보드 평가</div>
      <div id="mhe-result" style="color:${myHandEval.col};">${myHandEval.emoji} ${myHandEval.name}</div>
      <div id="mhe-action" style="color:#f0c040;">추천: ${myHandEval.action}</div>
    </div>`;
  }
  html+=`<div class="fr-section-title">상대 예상 핸드 분포 (${PFULL[S.posIdx]} vs ${S.potPlayers}명)</div>`;
  html+=ranges.map(r=>`<div class="range-item">
    <div class="ri-hand" style="color:${r.c};">${r.hand}</div>
    <div class="ri-bar-wrap"><div class="ri-bar" style="width:${r.pct}%;background:${r.c};"></div></div>
    <div class="ri-prob" style="color:${r.c};">${r.pct}%</div>
    <div class="ri-desc">${r.desc}</div>
  </div>`).join('');
  document.getElementById('flop-result').innerHTML=html;
}

/* ════════════════ 무료토너 모드 ════════════════ */
const FREE_LEVELS=[
  {sb:100,bb:200,min:6},{sb:200,bb:300,min:6},{sb:300,bb:600,min:6},
  {sb:400,bb:800,min:6},{sb:500,bb:1000,min:6},
  {sb:0,bb:0,min:6,brk:true},
  {sb:1000,bb:2000,min:6},{sb:2000,bb:3000,min:6},{sb:3000,bb:6000,min:6},
  {sb:4000,bb:8000,min:6},{sb:5000,bb:10000,min:6}
];
const FREE_START_HOUR=19;
let freeTimer=null,freeTickInterval=null,freeAutoInterval=null;

function initFreeMode(){
  const panel=document.getElementById('free-panel');
  panel.style.display='flex';
  const tbl=document.getElementById('free-blind-table');
  tbl.innerHTML=FREE_LEVELS.map((l,i)=>{
    if(l.brk)return '<div style="display:flex;flex-direction:column;align-items:center;padding:4px 7px;background:#1a1400;border-radius:5px;border:0.5px solid #3a3000;flex-shrink:0;"><div style="font-size:8px;color:#f0c040;font-weight:700;">BRK</div><div style="font-size:8px;color:#888;">6분</div></div>';
    const cur=S.freeLevel===i;
    return '<div style="display:flex;flex-direction:column;align-items:center;padding:4px 7px;background:'+(cur?'#1a0a3b':'#111')+';border-radius:5px;border:0.5px solid '+(cur?'#7c3aed':'#1a1a1a')+';flex-shrink:0;"><div style="font-size:8px;color:'+(cur?'#c084fc':'#888')+';font-weight:700;">Lv.'+(i+1)+'</div><div style="font-size:8px;color:'+(cur?'#e0e0e0':'#666')+';white-space:nowrap;">'+(l.sb>=1000?l.sb/1000+'K':l.sb)+'/'+(l.bb>=1000?l.bb/1000+'K':l.bb)+'</div></div>';
  }).join('');
  updateFreeCountdown();
  clearInterval(freeAutoInterval);
  freeAutoInterval=setInterval(updateFreeCountdown,1000);
}
function exitFreeMode(){
  document.getElementById('free-panel').style.display='none';
  clearInterval(freeAutoInterval);
  clearInterval(freeTickInterval);
}
function updateFreeCountdown(){
  const now=new Date();
  const target=new Date();
  target.setHours(FREE_START_HOUR,0,0,0);
  if(now>=target)target.setDate(target.getDate()+1);
  const diff=Math.max(0,Math.floor((target-now)/1000));
  const h=Math.floor(diff/3600),m=Math.floor((diff%3600)/60),s=diff%60;
  const el=document.getElementById('free-until');
  if(diff>0){el.textContent='시작까지 '+h+'h '+String(m).padStart(2,'0')+'m '+String(s).padStart(2,'0')+'s';el.style.color='#888';}
  else{el.textContent='진행중 Lv.'+(S.freeLevel+1);el.style.color='#c084fc';}
}
function startFreeLevel(lvl){
  if(lvl>=FREE_LEVELS.length){alert('무료 토너먼트 종료!');freeEliminate();return;}
  S.freeLevel=lvl;
  clearInterval(freeTickInterval);
  const level=FREE_LEVELS[lvl];
  if(level.brk){
    S.sbNow=FREE_LEVELS[lvl-1].sb;S.bbNow=FREE_LEVELS[lvl-1].bb;
    document.getElementById('sb').value=S.sbNow;
    document.getElementById('bb').value=S.bbNow;
    toggleBreak();
    const dur=level.min*60;let left=dur;
    freeTickInterval=setInterval(()=>{left--;if(left<=0){clearInterval(freeTickInterval);startFreeLevel(lvl+1);}},1000);
    return;
  }
  S.sbNow=level.sb;S.bbNow=level.bb;S.blindLevel=lvl+1;
  document.getElementById('sb').value=S.sbNow;
  document.getElementById('bb').value=S.bbNow;
  updateTimerUI();updateZoneBadge();updateBBDisplay();
  const fmt=n=>n>=1000?n/1000+'K':n;
  document.getElementById('ba-val').textContent=fmt(S.sbNow)+' / '+fmt(S.bbNow);
  document.getElementById('ba-sub').textContent='레벨 '+(lvl+1)+' 시작';
  if(lvl>0)document.getElementById('balert').classList.add('show');
  if(navigator.vibrate)navigator.vibrate([100,60,100,60,200]);
  initFreeMode();
  const dur=level.min*60;let left=dur;
  S.timerTotal=dur;S.timerLeft=dur;
  clearInterval(S.timerInterval);S.timerRunning=true;
  updateTimerUI();
  freeTickInterval=setInterval(()=>{
    left--;S.timerLeft=left;updateTimerUI();
    if(left<=0){clearInterval(freeTickInterval);S.timerRunning=false;updateTimerUI();startFreeLevel(lvl+1);}
  },1000);
}
function freeEliminate(){
  if(!confirm('탈락 처리하시겠습니까? 무료 토너 모드를 초기화합니다.'))return;
  clearInterval(freeTickInterval);clearInterval(freeAutoInterval);
  S.timerRunning=false;updateTimerUI();clearInterval(S.timerInterval);
  S.freeLevel=0;setMode('trn');resetTimer();
  if(navigator.vibrate)navigator.vibrate([200,100,200]);
}
function initFreeLevelAtCurrentTime(){
  const now=new Date();
  const start=new Date();start.setHours(FREE_START_HOUR,0,0,0);
  if(now<start){S.freeLevel=0;return;}
  const elapsed=Math.floor((now-start)/1000);
  let accum=0;
  for(let i=0;i<FREE_LEVELS.length;i++){
    const dur=FREE_LEVELS[i].min*60;
    if(elapsed<accum+dur){S.freeLevel=i;return;}
    accum+=dur;
  }
  S.freeLevel=FREE_LEVELS.length-1;
}

/* ════════════════ 헤더 설정 접기 ════════════════ */
function toggleSettings(){
  const el=document.getElementById('settings-panel');
  const arr=document.getElementById('tog-arrow');
  const collapsed=el.classList.toggle('collapsed');
  arr.textContent=collapsed?'▶':'▼';
}

/* ════════════════ 스타트 / 끝내기 ════════════════ */
function onStart(){
  if(S.mode==='free'){startFreeLevel(S.freeLevel);return;}
  toggleTimer();
}
function onEnd(){
  if(S.mode==='free'){freeEliminate();return;}
  if(!confirm('게임을 종료하시겠습니까?'))return;
  clearInterval(S.timerInterval);S.timerRunning=false;
  resetTimer();
}

/* ════════════════ 요약바 업데이트 ════════════════ */
function updateSummaryBar(){
  try{
    const seats=SEATS[S.players];
    const seat=seats[S.rotIdx]||{l:'?'};
    const fmt=n=>n>=1000?Math.round(n/100)/10+'K':n;
    const bb=S.bbNow||200,chips=S.curChip||0;
    const bbCount=chips>0?Math.round(chips/bb):0;
    const modeLabel=S.mode==='free'?'무료':S.mode==='pub'?'펍':'대회';
    const modeBg=S.mode==='free'?'#1a0a3b':S.mode==='pub'?'#3b1c00':'#14532d';
    const modeCol=S.mode==='free'?'#c084fc':S.mode==='pub'?'#fb923c':'#86efac';
    function set(id,txt,sty){const el=document.getElementById(id);if(!el)return;el.textContent=txt;if(sty)Object.assign(el.style,sty);}
    const villainSuffix=S.villain?' 🦹':'';
    const chipSuffix=S.chipLeader?' 👑':'';
    set('sum-mode',modeLabel+villainSuffix+chipSuffix,{background:modeBg,color:modeCol});
    set('sum-pos',seat.l);
    set('sum-players',S.players+'인');
    set('sum-lvl-info','Lv.'+S.blindLevel+' '+fmt(S.sbNow)+'/'+fmt(S.bbNow));
    set('sum-blind',fmt(S.sbNow)+'/'+fmt(S.bbNow));
    if(bbCount>0){const stk=getStackInfo();const z=zoneBadge(stk);set('sum-zone',z.txt,{color:z.col,background:z.bg,border:'0.5px solid '+z.col+'33'});}
    else{set('sum-zone','칩미입력',{color:'#555',background:'#111',border:'0.5px solid #1a1a1a'});}
    // 숏칩 뱃지 (10BB 미만)
    const shortBadge=document.getElementById('short-chip-badge');
    if(shortBadge){shortBadge.classList.toggle('on',bbCount>0&&bbCount<10);}
    // mode-desc 업데이트
    const descEl=document.getElementById('mode-desc');
    const descMap={trn:'GTO·앤티BB',pub:'표준 펍',mini:'🔥어그레시브·3만',daily:'💎데일리·5만',high:'👑하이롤·앤티',free:'🎮무료토너·20K'};
    if(descEl)descEl.textContent=S.villain?'🦹빌런모드 ON':(descMap[S.mode]||'');
    // btn-start 동기화
    const startBtn=document.getElementById('btn-start');
    if(startBtn){
      if(S.timerRunning){startBtn.textContent='⏸ 정지';startBtn.style.cssText='flex:1;height:28px;border-radius:6px;background:#3d1400;color:#fdba74;border:0.5px solid #7c2d12;font-size:11px;font-weight:700;';}
      else{startBtn.textContent='▶ 스타트';startBtn.style.cssText='flex:1;height:28px;border-radius:6px;background:#14532d;color:#86efac;border:0.5px solid #166534;font-size:11px;font-weight:700;';}
    }
  }catch(e){}
}

// 매트릭스 동적 셀 크기 계산
function calcMatrixSize(){
  const w=window.innerWidth-12;
  const cs=Math.floor((w-14)/14);
  const cl=Math.max(12,Math.round(cs*.55));
  document.documentElement.style.setProperty('--cs',Math.max(cs,22)+'px');
  document.documentElement.style.setProperty('--cl',Math.max(cl,12)+'px');
  document.documentElement.style.setProperty('--mf',Math.max(Math.round(cs*.3),7)+'px');
}
calcMatrixSize();
window.addEventListener('resize',calcMatrixSize);

document.getElementById('content').addEventListener('click',function(e){
  if(S.hand&&!e.target.closest('.mc')&&!e.target.closest('#sheet')){closeSheet();}
});

      const pw=document.getElementById('pot-btns');
      if(pw){pw.innerHTML='';for(let i=2;i<=8;i++){const b=document.createElement('button');b.className='potb'+(i===2?' on':'');b.dataset.n=i;b.textContent=i;b.onclick=()=>setPotPlayers(i);pw.appendChild(b);}}
    }

    }
  }catch(e){const dm=document.getElementById('debug-msg');if(dm){dm.textContent='TO:'+e.message;dm.style.display='block';}}
},200);
